<div class="wrapper-masthead" id="masthead">
  <div class="container">
    <header class="masthead">
      <div class="masthead-top">
        <div class="masthead-brand">
          <a href="{{ site.baseurl }}/" class="site-avatar">
            <picture>
              <source srcset="/images/optimized/lab_logo_140.webp" type="image/webp">
              <img src="{{ site.avatar }}" alt="{{ site.name }} logo" width="60" height="52" />
            </picture>
          </a>
          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>
        </div>
      </div>
      <nav aria-label="Main navigation">
        {% assign current_path = page.url | default: '/' %}
        <a href="{{ site.baseurl }}/"{% if current_path == '/' %} aria-current="page"{% endif %}>Home</a>
        <div class="nav-dropdown">
          <a class="nav-dropdown__toggle"
             href="{{ site.baseurl }}/people/"
             aria-haspopup="true"
             {% if current_path contains '/people' or current_path contains '/alumni' %}aria-current="page"{% endif %}>
            People
          </a>
          <div class="nav-dropdown__menu" aria-label="People submenu">
            <a href="{{ site.baseurl }}/people/"{% if current_path contains '/people' %} aria-current="page"{% endif %}>Current</a>
            <a href="{{ site.baseurl }}/alumni/"{% if current_path contains '/alumni' %} aria-current="page"{% endif %}>Alumni</a>
          </div>
        </div>
        <a href="{{ site.baseurl }}/research/"{% if current_path contains '/research' %} aria-current="page"{% endif %}>Research</a>
        <a href="{{ site.baseurl }}/news/"{% if current_path contains '/news' %} aria-current="page"{% endif %}>News</a>
        <a href="{{ site.baseurl }}/papers/"{% if current_path contains '/papers' %} aria-current="page"{% endif %}>Publications</a>
        <div class="nav-dropdown">
          <a class="nav-dropdown__toggle"
             href="{{ site.baseurl }}/tools/"
             aria-haspopup="true"
             {% if current_path contains '/tools' or current_path contains '/timevenn' or current_path contains '/rapidfieldsampling' %}aria-current="page"{% endif %}>
            Tools
          </a>
          <div class="nav-dropdown__menu" aria-label="Tools submenu">
            <a href="{{ site.baseurl }}/timevenn/"{% if current_path contains '/timevenn' %} aria-current="page"{% endif %}>TimeVenn</a>
            <a href="{{ site.baseurl }}/rapidfieldsampling/"{% if current_path contains '/rapidfieldsampling' %} aria-current="page"{% endif %}>RapidFieldSampling</a>
          </div>
        </div>
        <a href="{{ site.baseurl }}/jobs/"{% if current_path contains '/jobs' %} aria-current="page"{% endif %}>Join the Lab</a>
        {% if include.show_search %}
          <a href="{{ site.baseurl }}/search/"{% if current_path contains '/search' %} aria-current="page"{% endif %}>Search</a>
        {% endif %}
      </nav>
    </header>
  </div>
</div>
