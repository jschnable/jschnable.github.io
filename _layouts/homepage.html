<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">

    <link rel="preload" href="{{ site.baseurl }}/style.css" as="style">

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  </head>

  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    {% include masthead.html show_search=true %}

    <div id="main" role="main">
      <article class="page page--homepage">
        {{ content }}
      </article>
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
          <div class="footer-links">
            <a href="/peoplepages/coi/">COI Disclosure</a>
          </div>
        </footer>
      </div>
    </div>

    {% include analytics.html %}

    <script>
      (function() {
        var masthead = document.getElementById('masthead');
        if (!masthead) return;
        var scrollThreshold = 10;
        var ticking = false;
        function updateHeader() {
          if (window.scrollY > scrollThreshold) {
            masthead.classList.add('scrolled');
          } else {
            masthead.classList.remove('scrolled');
          }
          ticking = false;
        }
        window.addEventListener('scroll', function() {
          if (!ticking) {
            requestAnimationFrame(updateHeader);
            ticking = true;
          }
        }, { passive: true });
      })();
    </script>
  </body>
</html>
